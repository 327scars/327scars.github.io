<body class="product-file-body">
  <main class="product-file-page" id="productFilePage">
    <a class="story-back" id="backToStarters" href="story.html?phase=choice">← retour aux starters</a>
    <a class="product-policy-link" id="dropPolicyLink" href="drop-policy.html">drop policy</a>

    <section class="product-file-layout">
      <div class="viewer-wrap" aria-label="Vue 360 du produit">
        <div class="viewer-hint" id="viewerHint">tournez-le</div>

        <div class="viewer-mode-switch" id="viewerModes">
          <button type="button" class="viewer-mode-button is-active" data-mode="rotate">360</button>
          <button type="button" class="viewer-mode-button" data-mode="front">face avant</button>
          <button type="button" class="viewer-mode-button" data-mode="back">face arrière</button>
        </div>

        <div class="shirt-viewer" id="shirtViewer">
          <div class="shirt-360" id="shirt360">
            <img class="shirt-face shirt-face-front" id="viewerFront" alt="T-shirt devant" draggable="false" />
            <img class="shirt-face shirt-face-back" id="viewerBack" alt="T-shirt dos" draggable="false" />
          </div>
        </div>
      </div>

      <aside class="product-info-panel">

        <a class="checkout-button" href="#drop-locked" id="checkoutButton">
          AJOUTER AU PANIER / ADD TO CART
        </a>

    </section>

    <div class="drop-locked-modal" id="dropLockedModal" aria-hidden="true" role="status">

        <strong>ERROR 327</strong>
        <span>DROP LOCKED — ACCESS SOON / ACCÈS BIENTÔT</span>
      </div>
    </div>

    <footer class="product-mini-footer">SCARS 327 ©2026 · PRODUCT FILE</footer>
  </main>

  <script>
    const copy = {
      fr: {
        hint: "tournez-le / rotate it",
        back: "← retour aux starters",
        modes: { rotate: "360", front: "face avant", back: "face arrière" },
        checkout: "ajouter au panier / add to cart",
        route: "starter choisi · retourne aux starters pour changer",
        specs: [
          ["status", "drop locked"],
          ["drop", "soon"],
          ["prix", "à venir"],
          ["tailles", "XS — XXL"],
          ["composition", "coton heavyweight — détails bientôt"],
          ["livraison", "France / international — bientôt"]
        ],
        products: {
          white: {
            title: "starter blanc",
            description: "description : pièce claire, nette, frontale. Le starter qui expose la trace sans la cacher."
          },
          black: {
            title: "starter noir",
            description: "description : pièce profonde, silencieuse, dense. Le starter qui garde ce qui construit."
          },
          pink: {
            title: "starter rose",
            description: "description : pièce plus risquée, plus vive. Le starter qui transforme la cicatrice en signature."
          }
        }
      },
      en: {
        hint: "rotate it / tournez-le",
        back: "← back to starters",
        modes: { rotate: "360", front: "front", back: "back" },
        checkout: "add to cart / ajouter au panier",
        route: "starter chosen · back to starters to change",
        specs: [
          ["status", "drop locked"],
          ["drop", "soon"],
          ["price", "coming soon"],
          ["sizes", "XS — XXL"],
          ["composition", "heavyweight cotton — details soon"],
          ["shipping", "France / international — soon"]
        ],
        products: {
          white: {
            title: "white starter",
            description: "description: clean, direct, and exposed. The starter that reveals the mark without hiding it."
          },
          black: {
            title: "black starter",
            description: "description: deep, quiet, and dense. The starter that carries what built you."
          },
          pink: {
            title: "pink starter",
            description: "description: bold, vivid, and riskier. The starter that turns the scar into a signature."
          }
        }
      }
    };

    const productAssets = {
      white: { front: "assets/white-shirt-front-v55.png", back: "assets/white-shirt-back-v55.png" },
      black: { front: "assets/black-shirt-front-v55.png", back: "assets/black-shirt-back-v55.png" },
      pink: { front: "assets/pink-shirt-front-v55.png", back: "assets/pink-shirt-back-v55.png" }
    };

    const params = new URLSearchParams(window.location.search);
    const item = productAssets[params.get("item")] ? params.get("item") : "black";
    let lang = params.get("lang") || localStorage.getItem("scars327_lang") || "fr";
    let mode = "rotate";

    const viewer = document.getElementById("shirtViewer");
    const shirt = document.getElementById("shirt360");
    const front = document.getElementById("viewerFront");
    const back = document.getElementById("viewerBack");
    const titleEl = document.getElementById("productTitle");
    const descEl = document.getElementById("productDescription");
    const specsEl = document.getElementById("productSpecs");
    const hintEl = document.getElementById("viewerHint");
    const backLink = document.getElementById("backToStarters");
    const policyLink = document.getElementById("dropPolicyLink");
    const checkoutButton = document.getElementById("checkoutButton");
    const routeHintEl = document.getElementById("productRouteHint");
    const modeButtons = document.querySelectorAll(".viewer-mode-button");
    const langButtons = document.querySelectorAll(".lang-button");
    const productHintSeenKey = "scars327_product_hint_seen";

    document.body.classList.add("product-file-" + item);
    try { if (localStorage.getItem(productHintSeenKey) === "1") document.body.classList.add("product-hint-seen"); } catch (e) {}
    front.src = productAssets[item].front;
    back.src = productAssets[item].back;

    function normalize(deg) {
      let next = deg % 360;
      if (next < 0) next += 360;
      return next;
    }

    let dragging = false;
    let rafRotateQueued = false;
    let startX = 0;
    let startY = 0;
    let startAngle = 0;
    let angle = 0;
    const isMobileProduct = window.matchMedia('(max-width: 700px)').matches;

    function setAngle(nextAngle) {
      angle = normalize(nextAngle);
      shirt.style.setProperty("--rotation", angle + "deg");
    }

    function renderCopy() {
      localStorage.setItem("scars327_lang", lang);
      const langPack = copy[lang];
      const product = langPack.products[item];

      titleEl.textContent = product.title;
      descEl.textContent = product.description;
      hintEl.textContent = langPack.hint;
      backLink.textContent = langPack.back;
      backLink.href = `story.html?phase=choice&lang=${lang}&item=${item}`;
      checkoutButton.textContent = langPack.checkout;
      if (routeHintEl) routeHintEl.textContent = langPack.route;
      if (policyLink) policyLink.href = `drop-policy.html?item=${item}&lang=${lang}`;

      specsEl.innerHTML = langPack.specs.map(([key, value]) => `<div><dt>${key}</dt><dd>${value}</dd></div>`).join("");

      modeButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.mode === mode);
        const key = button.dataset.mode;
        button.textContent = langPack.modes[key];
      });

      langButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.lang === lang);
      });
    }

    function setMode(nextMode) {
      mode = nextMode;
      if (mode === "front") {
        setAngle(0);
      } else if (mode === "back") {
        setAngle(180);
      } else if (mode === "rotate") {
        setAngle(0);
      }
      renderCopy();
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    langButtons.forEach((button) => {
      button.addEventListener("click", () => {
        lang = button.dataset.lang;
        renderCopy();
      });
    });

    viewer.addEventListener("pointerdown", (event) => {
      document.body.classList.add("product-hint-seen");
      try { localStorage.setItem(productHintSeenKey, "1"); } catch (e) {}
      if (mode !== "rotate") return;
      dragging = true;
      startX = event.clientX;
      startY = event.clientY;
      startAngle = angle;
      viewer.setPointerCapture(event.pointerId);
      viewer.classList.add("is-dragging");
      event.preventDefault();
    });

    viewer.addEventListener("pointermove", (event) => {
      if (!dragging || mode !== "rotate") return;
      const delta = event.clientX - startX;
      const nextAngle = startAngle + delta * 0.52;
      if (!rafRotateQueued) {
        rafRotateQueued = true;
        requestAnimationFrame(() => {
          setAngle(nextAngle);
          rafRotateQueued = false;
        });
      } else {
        setAngle(nextAngle);
      }
      event.preventDefault();
    });

    function stopDragging() {
      dragging = false;
      viewer.classList.remove("is-dragging");
    }

    viewer.addEventListener("pointerup", stopDragging);
    viewer.addEventListener("pointercancel", stopDragging);
    viewer.addEventListener("dragstart", (event) => event.preventDefault());

    function tick() {
      if (!isMobileProduct && mode === "rotate" && !dragging) {
        setAngle(angle + 0.028);
      }
      requestAnimationFrame(tick);
    }


    function playDropLockedSound() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ctx = new Ctx();
        const now = ctx.currentTime;
        [[540,0,0.055,0.11],[820,0.052,0.075,0.10],[300,0.13,0.16,0.075],[1020,0.20,0.055,0.065]].forEach(([freq,start,dur,vol]) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(freq, now + start);
          gain.gain.setValueAtTime(0.0001, now + start);
          gain.gain.exponentialRampToValueAtTime(vol, now + start + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now + start);
          osc.stop(now + start + dur + 0.02);
        });
        setTimeout(() => { try { ctx.close(); } catch(e) {} }, 420);
      } catch (e) {}
    }

    const dropModal = document.getElementById("dropLockedModal");
    checkoutButton.addEventListener("click", (event) => {
      event.preventDefault();
      playDropLockedSound();
      dropModal.classList.add("is-visible");
      dropModal.setAttribute("aria-hidden", "false");
      window.setTimeout(() => {
        dropModal.classList.remove("is-visible");
        dropModal.setAttribute("aria-hidden", "true");
      }, 1800);
    });

    renderCopy();
    setMode("rotate");
    tick();
  </script>
<script>
/* v101 — polished guide/helpers behavior */
(function () {
  const body = document.body;
  const guide = document.querySelector('.site-guide');

  function hideGuide() {
    sessionStorage.setItem('scars327_scrollGuideDismissed', '1');
    body.classList.add('site-guide-dismissed');
    body.classList.remove('site-guide-countdown');
    if (guide) guide.classList.add('is-hidden');
  }

  if (sessionStorage.getItem('scars327_scrollGuideDismissed') === '1') {
    body.classList.add('site-guide-dismissed');
    if (guide) guide.classList.add('is-hidden');
  } else if (guide) {
    let armed = false;
    const baseY = window.scrollY || document.documentElement.scrollTop || 0;
    const onRealScroll = () => {
      const currentY = window.scrollY || document.documentElement.scrollTop || 0;
      if (armed || Math.abs(currentY - baseY) < 8) return;
      armed = true;
      body.classList.add('site-guide-countdown');
      setTimeout(hideGuide, 5000);
      window.removeEventListener('scroll', onRealScroll);
    };
    window.addEventListener('scroll', onRealScroll, { passive: true });
  }

  const markFlipUsed = () => body.classList.add('has-flipped-shirt');
  document.querySelectorAll('.product-card').forEach((card) => {
    card.addEventListener('click', markFlipUsed, { passive: true });
    card.addEventListener('touchstart', markFlipUsed, { passive: true });
  });

  const markViewerUsed = () => body.classList.add('has-used-viewer');
  const viewer = document.getElementById('shirtViewer');
  if (viewer) {
    ['pointerdown', 'touchstart', 'mousedown'].forEach((eventName) => {
      viewer.addEventListener(eventName, markViewerUsed, { passive: true });
    });
  }
  document.querySelectorAll('.viewer-mode-button').forEach((button) => {
    button.addEventListener('click', markViewerUsed, { passive: true });
  });
})();
</script>
